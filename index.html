<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Gerador de Senhas</h2>
        
        <div class="password-container">
            <input type="text" id="password" readonly placeholder="Sua senha aparecerá aqui">
        </div>

        <div class="settings">
            <div class="setting">
                <label for="length">Comprimento: <span id="length-val">12</span></label>
                <input type="range" id="length" min="6" max="25" value="12">
            </div>
            <div class="setting">
                <label><input type="checkbox" id="uppercase" checked> Letras Maiúsculas</label>
            </div>
            <div class="setting">
                <label><input type="checkbox" id="lowercase" checked> Letras Minúsculas</label>
            </div>
            <div class="setting">
                <label><input type="checkbox" id="numbers" checked> Números</label>
            </div>
            <div class="setting">
                <label><input type="checkbox" id="symbols" checked> Símbolos</label>
            </div>
        </div>

        <button id="generate-btn">Gerar Senha</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
